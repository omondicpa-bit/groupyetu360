# Workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Split into two jobs deliberately: if build+deploy are combined into one job,
  # re-running just that job (e.g. after a transient "Deployment failed, try
  # again later" from GitHub's side) re-runs the artifact upload step too within
  # the SAME run — which creates a second "github-pages" artifact and fails with
  # "Multiple artifacts named github-pages were unexpectedly found." Splitting
  # them means a failed deploy can be safely retried on its own, without ever
  # re-triggering the build/upload step.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files only
        run: |
          mkdir _site
          rsync -av \
            --exclude='.gradle' \
            --exclude='app' \
            --exclude='build' \
            --exclude='gradle' \
            --exclude='supabase' \
            --exclude='.git' \
            --exclude='_site' \
            --exclude='build.gradle' \
            --exclude='CHANGELOG.md' \
            --exclude='HANDOVER.md' \
            --exclude='*.sql' \
            ./ ./_site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

